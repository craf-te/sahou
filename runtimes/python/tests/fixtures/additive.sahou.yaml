schema: runtime_demo
version: 1
nodes:
  sensor: {}
  display: {}
connections:
  touch:
    pattern: pub_sub
    from: sensor
    to: [display]
    payload:
      typing: typed
      fields:
        - { name: x, type: float, min: 0, max: 1 }
        - { name: phase, type: enum, values: [down, move, up] }
        - { name: pressure, type: float, required: false }
  ask:
    pattern: query
    from: sensor
    to: [display]
    request:
      typing: typed
      fields:
        - { name: sel, type: string, max_len: 32 }
    response:
      typing: typed
      fields:
        - { name: level, type: int }
