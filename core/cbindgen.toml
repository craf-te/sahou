# cbindgen config for the sahou C ABI (feature = "capi").
# Regenerate: `cd core && cbindgen --config cbindgen.toml -o sahou.h` (or `just build-ffi`).
language = "C"
include_guard = "SAHOU_H"
header = "/* sahou C ABI — generated by cbindgen from core/src/cffi.rs. Do not edit by hand. */"
tab_width = 2
style = "type"

[parse]
parse_deps = false

# The FFI lives behind `#[cfg(feature = "capi")]`. cbindgen can't evaluate cargo features on stable
# (expand needs nightly), so emit the declarations under this C guard instead of dropping them.
# Consumers compile with -DSAHOU_CAPI (the typedef repeat is a legal same-type redefinition in C11/C++).
[defines]
"feature = capi" = "SAHOU_CAPI"
